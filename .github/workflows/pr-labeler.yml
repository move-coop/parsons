name: PR labeler

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

jobs:
  label-from-checkboxes:
    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Update labels based on checkboxes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = context.payload.pull_request.body;
            const labelsToAdd = [];
            const labelsToRemove = [];

            // Define your mapping of checkbox text to label names
            const options = [
              { text: 'label: Breaking change', label: 'breaking-change' },
              { text: 'label: Non-breaking change', label: 'non-breaking-change' }
            ];

            options.forEach(opt => {
              // Regex to check if [x] is marked for a specific string
              const isChecked = new RegExp(`- \\[x\\] ${opt.text}`, 'i').test(body);

              if (isChecked) {
                labelsToAdd.push(opt.label);
              } else {
                labelsToRemove.push(opt.label);
              }
            });

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd
              });
            }

            // Optional: Logic to remove labels if unchecked
            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
              } catch (e) {
                // Ignore error if the label wasn't there to begin with
              }
            }