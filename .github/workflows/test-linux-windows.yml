name: tests

on:
  pull_request:
    branches: ["main", "major-release"]
  push:
    branches: ["main", "major-release"]

env:
  TESTING: 1

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
        limited-dependencies: ['','TRUE']
        os: [ubuntu-latest]   # add in windows-latest to add windows testing

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Install uv
      run: |
        pip install -U uv

    - name: Install dependencies
      env:
        PARSONS_LIMITED_DEPENDENCIES: ${{ matrix.limited-dependencies }}
      run: |
        uv pip install --system -U pip
        uv pip install --system -e .[all]
        uv pip install --system -r requirements-dev.txt

    - name: Run tests
      run: pytest -rf test/

    - name: check linting
      run: |
        # E203 and W503 don't work well with black
        flake8 parsons/ test/ useful_resources/ --extend-ignore=E203,W503
        black --check parsons/ test/ useful_resources/
