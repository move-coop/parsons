<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page Not Found</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --text: #1f2937;
        --bg: #f6bdb8;
      }

      /* Base resets and centered layout */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        text-align: center;
      }

      .container {
        max-width: 400px;
        padding: 2rem;
      }

      /* Typography */
      h1 { font-size: 5rem; margin: 0; }
      h2 { font-size: 1.5rem; margin-top: 0; }
      p { line-height: 1.6; }

      /* Components */
      .logo {
        width: 128px;
        height: 128px;
        margin-top: 1.5rem;
        object-fit: contain;
      }

      .btn {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background-color: var(--primary);
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        transition: background 0.2s;
      }

      .btn:hover { background-color: var(--primary-hover); }

      /* Feedback elements */
      .loader {
        border: 3px solid #f3f3f3;
        border-top-color: var(--primary);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: inline-block;
        vertical-align: middle;
        margin-right: 10px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      #error-content { display: none; }
    </style>
    <script type="text/javascript">
      document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        let targetURL = currentPath;

        if (targetURL.includes('/html/')) {
            targetURL = targetURL.replace('/html/', '/');
        }

        const versionMatch = currentPath.match(/\/parsons\/[^/]+\//);
        const homeBtn = document.getElementById('home-link');
        if (homeBtn) homeBtn.href = versionMatch ? versionMatch[0] + 'index.html' : '/';

        fetch(targetURL, { method: 'HEAD' })
          .then(response => {
            if (response.ok && targetURL !== currentPath) {
              window.location.replace(targetURL);
            } else {
              show404();
            }
          })
          .catch(() => show404());
      });

      function show404() {
        document.getElementById('redirecting-content').style.display = 'none';
        document.getElementById('error-content').style.display = 'block';
        document.title = "404 - Not Found";
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div id="project-logo">
         <img class="logo" src="/parsons/latest/_static/parsons_logo.png" alt="Parsons logo of a large letter 'P' with a jigsaw puzzle piece cutout, enclosed within a black circular border that resembles a gear or cog.">
      </div>
      <div id="redirecting-content">
        <div class="loader"></div>
        <span>Finding the right page...</span>
      </div>
      <div id="error-content">
        <h1>404</h1>
        <p>We tried to find a newer version of this page for you, but it looks like it's gone for good.</p>
        <a id="home-link" href="/parsons/latest/index.html" class="btn">Parsons Documentation Home</a>
      </div>
    </div>
  </body>
</html>
